version: 1
map_file: AGENTS.md
task_packages_root: docs/task-packages
archived_task_packages_root: docs/archived/task-packages
required_design_files:
  - README.md
  - STATUS.yaml
  - 01-requirements.md
  - 02-overview-design.md
  - 03-detailed-design.md
  - 04-verification.md
  - 05-evidence.md
workflow:
  discovery_order:
    - AGENTS.md
    - docs/task-packages/<task>/README.md
    - docs/task-packages/<task>/STATUS.yaml
    - docs/task-packages/<task>/01-requirements.md
    - docs/task-packages/<task>/02-overview-design.md
    - docs/task-packages/<task>/03-detailed-design.md
    - docs/task-packages/<task>/04-verification.md
    - docs/task-packages/<task>/05-evidence.md
  default_status_flow:
    - proposed
    - requirements_ready
    - overview_ready
    - detailed_ready
    - in_progress
    - verifying
    - archived
artifacts:
  task_env_root: .harness/workspaces
  debug_bundle_root: .harness/artifacts
  trace_root: .harness/traces
