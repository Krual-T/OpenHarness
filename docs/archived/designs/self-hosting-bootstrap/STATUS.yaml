id: OH-001
title: OpenHarness Self-Hosting Bootstrap
status: archived
summary: Bootstrap the OpenHarness repository into a self-hosted minimal harness repo with runnable CLI, tests, and an initial active design package.
owner: codex
created_at: 2026-03-20
updated_at: 2026-03-20
depends_on: []
scope:
  areas:
    - repository-structure
    - harness-cli
    - tests
    - documentation
entrypoints:
  - docs/archived/designs/self-hosting-bootstrap/README.md
  - docs/archived/designs/self-hosting-bootstrap/01-requirements.md
  - docs/archived/designs/self-hosting-bootstrap/02-overview-design.md
  - docs/archived/designs/self-hosting-bootstrap/03-detailed-design.md
done_criteria:
  - The repository contains at least one valid active design package and passes `openharness.py bootstrap` and `check-designs`.
  - Python workflow dependencies needed by the harness CLI and tests are declared in `pyproject.toml` and runnable via `uv run`.
  - The self-hosting repo tests target the actual repository layout and pass locally.
  - Core repo documentation no longer contains obvious stale identity or workflow-path errors that block self-hosting.
verification:
  required_commands:
    - uv run python skills/using-openharness/scripts/openharness.py bootstrap
    - uv run python skills/using-openharness/scripts/openharness.py check-designs
    - uv run pytest
  required_scenarios: []
evidence:
  docs:
    - docs/archived/designs/self-hosting-bootstrap/05-verification.md
    - docs/archived/designs/self-hosting-bootstrap/06-evidence.md
  code:
    - pyproject.toml
    - skills/using-openharness/scripts/openharness.py
    - AGENTS.md
    - README.md
  tests:
    - skills/using-openharness/tests/test_openharness.py
