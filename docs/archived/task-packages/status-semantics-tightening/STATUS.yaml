  - docs/archived/task-packages/status-semantics-tightening/02-overview-design.md
  - docs/archived/task-packages/status-semantics-tightening/03-detailed-design.md
done_criteria:
  - The package defines a non-ambiguous meaning for each workflow status in the default status flow.
  - The package defines what evidence or readiness conditions must hold before a package may move into each later status.
  - The package clarifies how runtime verification outcomes constrain `verifying`, completion claims, and archiving.
  - Follow-up implementation can update templates, CLI validation, and workflow wording without rediscovering the core semantics.
