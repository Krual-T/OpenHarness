done_criteria:
- '`bootstrap` outputs the current stage, next stage, and suggested next step in both
  text and JSON forms.'
- '`new-task` can allocate a stable next task id automatically without breaking existing
  positional usage.'
- '`brainstorming` and `using-openharness` explicitly document the stage-checkpoint
  and post-brainstorming auto-scaffold rules.'
- Repository tests cover the new CLI behavior and protocol wording.
