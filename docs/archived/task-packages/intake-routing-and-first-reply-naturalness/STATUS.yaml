done_criteria:
  - 明确区分哪些任务类型应以前台 `bootstrap` 作为入口，哪些任务类型只应把它作为后台上下文。
  - 定义首轮用户可见回复的最小自然度约束，使其既保留阶段信息，又不直接回放内部执行日志。
  - 给出需要修改的协议、CLI、测试与文档落点，以及对应验证方式。
verification:
