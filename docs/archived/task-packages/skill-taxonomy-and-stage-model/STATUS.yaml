  their workflow stage or trigger.
- The live repository no longer mixes protocol strength and theme buckets as the main
  taxonomy model.
- Affected repository-owned skills describe their protocol role and primary stage
  consistently enough that future maintenance can audit them mechanically.
- Live docs describe OpenHarness as a plug-and-play Agent Harness for Python-first
