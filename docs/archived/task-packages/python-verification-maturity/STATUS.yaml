id: OH-007
title: Python Verification Maturity
# Default flow: proposed -> requirements_ready -> overview_ready -> detailed_ready -> in_progress -> verifying -> archived
# requirements_ready -> overview_ready -> detailed_ready are design-readiness checkpoints; later statuses imply earlier checkpoints are already materially complete.
status: archived
summary: Define the Python verification baseline when runtime tests are incomplete, using pytest as the minimum verification floor while making runtime-test expectations explicit and incremental.
owner: codex
created_at: 2026-03-21
updated_at: 2026-03-22
depends_on:
  - OH-004
  - OH-005
  - OH-006
scope:
  areas:
    - python
    - verification
    - runtime-tests
    - completion-rules
    - templates
entrypoints:
  - docs/archived/task-packages/python-verification-maturity/README.md
  - docs/archived/task-packages/python-verification-maturity/01-requirements.md
  - docs/archived/task-packages/python-verification-maturity/02-overview-design.md
  - docs/archived/task-packages/python-verification-maturity/03-detailed-design.md
done_criteria:
  - The repository defines `pytest` as the default minimum verification floor for Python work when runtime tests are incomplete.
  - The workflow explains when runtime tests are required now, recommended next, or can be built in parallel.
  - The completion protocol records verification strength honestly instead of treating every passing Python test run as equivalent evidence.
  - The package stays focused on Python verification maturity rather than repository entry routing.
  - Follow-up implementation can update docs, templates, and verification guidance from this package without rediscovering the product boundary.
verification:
  required_commands:
    - uv run python skills/using-openharness/scripts/openharness.py check-tasks
    - uv run python skills/using-openharness/scripts/openharness.py bootstrap
    - uv run pytest
  required_scenarios: []
evidence:
