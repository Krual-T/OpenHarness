id: OH-008
title: Skill Taxonomy And Compatibility Cleanup
# Default flow: proposed -> requirements_ready -> overview_ready -> detailed_ready -> in_progress -> verifying -> archived
# requirements_ready -> overview_ready -> detailed_ready are design-readiness checkpoints; later statuses imply earlier checkpoints are already materially complete.
# `detailed_ready` is the normal resting point for design-complete work before implementation.
# `archived` means the task package is implemented, verified, and no longer active.
status: archived
summary: Clarify core protocol skills, optional helpers, compatibility shims, and imported generic skills so the skill hub and per-skill docs stop drifting.
owner: codex
created_at: 2026-03-22
updated_at: 2026-03-23
depends_on:
  - OH-004
  - OH-006
scope:
  areas:
    - skill-taxonomy
    - compatibility
    - workflow-docs
    - tests
    - maintenance-prerequisites
entrypoints:
  - docs/archived/task-packages/skill-taxonomy-and-compatibility-cleanup/README.md
  - docs/archived/task-packages/skill-taxonomy-and-compatibility-cleanup/01-requirements.md
  - docs/archived/task-packages/skill-taxonomy-and-compatibility-cleanup/02-overview-design.md
  - docs/archived/task-packages/skill-taxonomy-and-compatibility-cleanup/03-detailed-design.md
done_criteria:
  - The repository defines one stable classification model for core protocol skills, optional helpers, and imported generic skills.
  - The skill hub and affected per-skill docs use that model consistently without implying parallel repository entry systems.
  - Repository tests cover the intended taxonomy and fail when live wording drifts back toward retired plan-oriented skills.
  - OH-004 reflects this package as the taxonomy stream and no longer carries the implementation detail itself.
  - The repository no longer ships `writing-plans`, `writing-skills`, or `executing-plans`, and all repository references to them are removed or rewritten.
verification:
  required_commands:
    - uv run python skills/using-openharness/scripts/openharness.py check-tasks
    - uv run pytest
  required_scenarios: []
evidence:
  docs:
    - docs/archived/task-packages/skill-taxonomy-and-compatibility-cleanup/05-verification.md
    - docs/archived/task-packages/skill-taxonomy-and-compatibility-cleanup/06-evidence.md
  code: []
  tests: []
