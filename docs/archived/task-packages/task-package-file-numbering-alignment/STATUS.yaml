done_criteria:
  - Task package canonical filenames become `01-requirements.md`, `02-overview-design.md`, `03-detailed-design.md`, `04-verification.md`, `05-evidence.md`.
  - Manifest, templates, validation rules, protocol docs, and tests use the new numbering consistently.
  - Existing active and archived task packages are renamed and their internal references updated to the new numbering.
  - Verification passes against the renumbered protocol and repository task packages.
