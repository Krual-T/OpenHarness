  - harness-cli
entrypoints:
- docs/archived/task-packages/workflow-transition-and-verification-artifacts/README.md
- docs/archived/task-packages/workflow-transition-and-verification-artifacts/01-requirements.md
- docs/archived/task-packages/workflow-transition-and-verification-artifacts/02-overview-design.md
- docs/archived/task-packages/workflow-transition-and-verification-artifacts/03-detailed-design.md
done_criteria:
- OpenHarness exposes a `transition` subcommand that rejects skipped forward transitions,
  illegal archive moves, and target states whose required semantic anchors are still
  missing.
- OpenHarness `verify` writes a structured JSON artifact for each run under `.harness/artifacts/<task-id>/verification-runs/`
  and updates the package `STATUS.yaml` with the latest run metadata.
- Archiving through the supported CLI path requires a successful latest verification
  artifact and moves the package into `docs/archived/task-packages/<task>/` while
  rewriting package-local path references.
- Templates and tests describe and pin the new workflow so future packages can use
  it without rediscovery.
