done_criteria:
- The package defines the decision rule between reusing an existing runtime helper,
  adding a new helper, and opening a bootstrap package first.
- The package defines the minimum boundary of a project runtime helper so one helper
  does not absorb unrelated runtime surfaces.
- The package identifies the repository surfaces and documents that later implementation
  must update when adding a runtime helper workflow.
- The package defines the expected writeback into task-package design, verification,
  and evidence artifacts.
