done_criteria:
  - "为仓库内每个 live repo skill 补齐 `agents/openai.yaml`，并保证字段使用官方支持的元数据形状。"
  - "明确记录每个 skill 的隐式触发策略，至少把不应靠模糊语义自动触发的技能降为显式调用优先。"
  - "如技能需要外部工具或特定能力，改为在 `openai.yaml` 中声明依赖，而不是只散落在 `SKILL.md` 正文里。"
  - "增加防回归测试，确保关键 skill 的 metadata 文件存在且策略分类符合设计。"
  - "通过 `STATUS.yaml.verification.required_commands` 中声明的校验命令。"
verification:
  required_commands:
    - uv run pytest skills/using-openharness/tests/test_openharness.py -k "skill_openai_metadata or openai_yaml or implicit_invocation"
    - uv run pytest skills/using-openharness/tests/test_openharness.py
    - uv run python skills/using-openharness/scripts/openharness.py check-tasks
  required_scenarios:
    - "所有 live repo skills 都能从仓库中解析到 `agents/openai.yaml`。"
    - "被标记为显式调用优先的技能不会再依赖模糊 `description` 触发。"
    - "需要工具依赖的技能通过 metadata 明确暴露依赖，而不是只写在正文中。"
