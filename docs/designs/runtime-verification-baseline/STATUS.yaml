id: OH-005
title: Runtime Verification Baseline
status: overview_ready
summary: Define the minimum verification protocol and evidence contract for OpenHarness tasks in repositories that may not have an existing runtime harness.
owner: codex
created_at: 2026-03-20
updated_at: 2026-03-20
depends_on:
  - OH-004
scope:
  areas:
    - runtime-verification
    - verification-evidence
    - status-semantics
    - no-harness-bootstrap
entrypoints:
  - docs/designs/runtime-verification-baseline/README.md
  - docs/designs/runtime-verification-baseline/01-requirements.md
  - docs/designs/runtime-verification-baseline/02-overview-design.md
  - docs/designs/runtime-verification-baseline/03-detailed-design.md
done_criteria:
  - The package defines a minimum verification ladder that applies even when no pre-existing runtime harness exists.
  - The package defines what evidence belongs in `05-verification.md` and `06-evidence.md` for automated, task-local, and manual verification paths.
  - The package clarifies how verification evidence constrains package completion claims and the `verifying` status.
  - Follow-up implementation can update skills, templates, and harness CLI behavior from this package without rediscovering core semantics.
verification:
  required_commands:
    - uv run python skills/using-openharness/scripts/openharness.py check-designs
    - uv run pytest
  required_scenarios: []
evidence:
  docs:
    - docs/designs/runtime-verification-baseline/05-verification.md
    - docs/designs/runtime-verification-baseline/06-evidence.md
  code: []
  tests: []
