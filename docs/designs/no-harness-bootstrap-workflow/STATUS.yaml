id: OH-007
title: No-Harness Bootstrap Workflow
# Default flow: proposed -> requirements_ready -> overview_ready -> detailed_ready -> in_progress -> verifying -> archived
# requirements_ready -> overview_ready -> detailed_ready are design-readiness checkpoints; later statuses imply earlier checkpoints are already materially complete.
status: detailed_ready
summary: Define how OpenHarness should enter a repository with no harness, no package history, and no established verification loop, while still producing a usable first-round package and verification path.
owner: codex
created_at: 2026-03-21
updated_at: 2026-03-21
depends_on:
  - OH-004
  - OH-005
  - OH-006
scope:
  areas:
    - bootstrap
    - design-packages
    - verification
    - templates
    - repository-entry
entrypoints:
  - docs/designs/no-harness-bootstrap-workflow/README.md
  - docs/designs/no-harness-bootstrap-workflow/01-requirements.md
  - docs/designs/no-harness-bootstrap-workflow/02-overview-design.md
  - docs/designs/no-harness-bootstrap-workflow/03-detailed-design.md
done_criteria:
  - The repository defines a first-round bootstrap sequence for repositories that have no OpenHarness package history yet.
  - The workflow identifies the minimum repo-local artifacts that must exist after bootstrap and the optional artifacts that can wait.
  - The workflow defines how the first active design package is chosen or scaffolded without inventing a parallel planning system.
  - The workflow defines how a bootstrap round establishes a credible verification path even when repository automation is weak.
  - Follow-up implementation can update docs, templates, and CLI support from this package without rediscovering the product boundary.
verification:
  required_commands:
    - uv run python skills/using-openharness/scripts/openharness.py check-designs
    - uv run python skills/using-openharness/scripts/openharness.py bootstrap
    - uv run pytest
  required_scenarios: []
evidence:
  docs:
    - docs/designs/no-harness-bootstrap-workflow/05-verification.md
    - docs/designs/no-harness-bootstrap-workflow/06-evidence.md
  code: []
  tests: []
