  - docs/designs/harness-completion-roadmap/01-requirements.md
  - docs/designs/harness-completion-roadmap/02-overview-design.md
  - docs/designs/harness-completion-roadmap/03-detailed-design.md
done_criteria:
  - The repository defines a minimal default runtime verification protocol for projects that start with no runtime harness.
  - The repository defines an explicit bootstrap workflow for no-harness projects rather than assuming an existing harness baseline.
  - The repository defines a maintenance / entropy-reduction workflow for ongoing cleanup and review.
  - The repository tightens status semantics and clarifies core vs compatibility vs optional skills.
  - Follow-up implementation can proceed from this package without rediscovering the remaining major gaps.
