  - docs/task-packages/runtime-capability-contract/03-detailed-design.md
done_criteria:
  - OpenHarness defines what a project-specific runtime capability is and what minimum fields it must declare.
  - The protocol explicitly supports multiple runtime surfaces and multiple helper skills within one repository.
  - The routing contract states when `using-openharness` should invoke a project runtime helper versus when it should first create a bootstrap package.
  - The package identifies the live repository surfaces that later implementation must update.
