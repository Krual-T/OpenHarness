id: OH-034
title: Chinese Guidance Entry And Discoverability
# Default flow: proposed -> requirements_ready -> overview_ready -> detailed_ready -> in_progress -> verifying -> archived
# requirements_ready -> overview_ready -> detailed_ready are design-readiness checkpoints; later statuses imply earlier checkpoints are already materially complete.
# `detailed_ready` is the normal resting point for design-complete work before implementation.
# `archived` means the task package is implemented, verified, and no longer active.
status: detailed_ready
summary: Improve Chinese-first discoverability of task-package guidance and reduce protocol-only friction for new maintainers.
owner: codex
created_at: 2026-03-27
updated_at: 2026-03-27
depends_on:
  - OH-033
scope:
  areas:
    - AGENTS.md
    - skills/using-openharness
    - skills/brainstorming
    - skills/exploring-solution-space
    - docs/task-packages
    - openharness_cli
entrypoints:
  - docs/task-packages/chinese-guidance-entry-and-discoverability/README.md
  - docs/task-packages/chinese-guidance-entry-and-discoverability/01-requirements.md
  - docs/task-packages/chinese-guidance-entry-and-discoverability/02-overview-design.md
  - docs/task-packages/chinese-guidance-entry-and-discoverability/03-detailed-design.md
done_criteria:
  - 为中文使用者提供一个稳定、可发现的作者入口，不再要求先阅读多个英文 `SKILL.md` 才知道 guidance 在哪里。
  - 明确 bootstrap、README、skill-hub 和关键 stage skill 应如何导流到五份 guidance。
  - 给出模板增强方案，使新建 task package 时能看到更具体的最小提示，但不把模板膨胀成手册。
  - 给出可执行的实现落点、验证路径和失败模式说明，使后续实现可以直接开始。
verification:
  required_commands:
    - uv run openharness check-tasks
  required_scenarios:
    - 新协作者能够在仓库入口或 bootstrap 输出中直接看到中文作者入口和 guidance 导航。
    - task package 模板在不显著变长的前提下，为五类文档提供更具体的最小写作提示。
    - 关键 stage skill 保持动作导向，但同时能把作者导向对应 guidance，而不是要求用户自行在仓库中搜索。
  last_run_at: "2026-03-27"
  last_run_result: passed
  last_run_artifact: ""
