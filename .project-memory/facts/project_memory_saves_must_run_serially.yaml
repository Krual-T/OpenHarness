statement: skills/project-memory/scripts/save_fact.py、save_decision.py 和 save_workflow.py
  都会通过 project_memory_lib.save_memory_object 重写 .project-memory/aliases.yaml 并重建索引；同一轮批量刷新多个
  memory object 时必须串行执行这些保存脚本，不能并行运行，否则会发生竞争写入并破坏 aliases.yaml。
