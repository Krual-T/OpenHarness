alternatives:
- 所有技能都允许隐式触发
consequences:
- 每个新技能都需要显式判断触发策略并在 metadata 与测试中固定
revisit_when:
- 真实使用中出现明显误触发或漏触发，需要重新划分 implicit 边界时
question: 仓库技能的 openai metadata 是否应该统一允许隐式触发
decision: 不统一允许，核心流程技能保持 allow_implicit_invocation=true，执行型和收尾型技能按显式调用优先收敛
rationale: 减少模糊语义误触发，同时保留 using-openharness 等核心流程技能的自动路由能力
