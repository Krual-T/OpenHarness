version: 1
map_file: AGENTS.md
designs_root: docs/designs
archived_designs_root: docs/archived/designs
required_design_files:
  - README.md
  - STATUS.yaml
  - 01-requirements.md
  - 02-overview-design.md
  - 03-detailed-design.md
  - 04-implementation-plan.md
  - 05-verification.md
  - 06-evidence.md
workflow:
  discovery_order:
    - AGENTS.md
    - docs/designs/<design>/README.md
    - docs/designs/<design>/STATUS.yaml
    - docs/designs/<design>/01-requirements.md
    - docs/designs/<design>/02-overview-design.md
    - docs/designs/<design>/03-detailed-design.md
    - docs/designs/<design>/04-implementation-plan.md
    - docs/designs/<design>/05-verification.md
    - docs/designs/<design>/06-evidence.md
  default_status_flow:
    - proposed
    - requirements_ready
    - overview_ready
    - detailed_ready
    - in_progress
    - verifying
    - archived
artifacts:
  task_env_root: .harness/workspaces
  debug_bundle_root: .harness/artifacts
  trace_root: .harness/traces
